name: hermes_desktop
description: Hermes Agent Desktop Manager - Flutter UI
publish_to: 'none'
version: 1.0.4+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.0
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  window_manager: ^0.4.2
  flutter_markdown: ^0.7.0
  file_picker: ^8.0.0
  desktop_drop: ^0.4.4
  path_provider: ^2.1.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
