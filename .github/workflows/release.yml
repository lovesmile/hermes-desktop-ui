name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Windows release
        run: flutter build windows --release

      - name: Bundle VC++ runtime DLLs for target machines without redist
        shell: pwsh
        run: |
          # 从 VS 安装目录复制 VC++ CRT DLL 到构建输出
          # 找不到 VS 时用 System32 回退（GitHub Actions runner 上有）
          $redistDir = Resolve-Path "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Redist\MSVC\*\x64\Microsoft.VC143.CRT" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($redistDir) {
            Copy-Item "$redistDir\msvcp140.dll"    -Destination build\windows\x64\runner\Release\ -ErrorAction Stop
            Copy-Item "$redistDir\msvcp140_1.dll"  -Destination build\windows\x64\runner\Release\ -ErrorAction Stop
            Copy-Item "$redistDir\vcruntime140.dll" -Destination build\windows\x64\runner\Release\ -ErrorAction Stop
            Copy-Item "$redistDir\vcruntime140_1.dll" -Destination build\windows\x64\runner\Release\ -ErrorAction Stop
            Write-Output "Copied VC++ CRT DLLs from $redistDir"
          } else {
            Write-Output "VC++ redist dir not found, fallback to System32..."
            $sys32Files = @('msvcp140.dll','msvcp140_1.dll','vcruntime140.dll','vcruntime140_1.dll')
            $allOk = $true
            foreach ($f in $sys32Files) {
              $src = "C:\Windows\System32\$f"
              if (Test-Path $src) {
                Copy-Item $src -Destination build\windows\x64\runner\Release\ -ErrorAction Stop
                Write-Output "  Copied $f from System32"
              } else {
                Write-Output "  WARNING: $f not found in System32 either"
                $allOk = $false
              }
            }
            if (-not $allOk) {
              Write-Output "Some VC++ DLLs missing — target machines without redist may crash"
            }
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Hermes standalone exe
        shell: pwsh
        run: |
          pip install hermes-agent aiohttp pyinstaller
          pyinstaller --onefile --name hermes --hidden-import aiohttp scripts/run_hermes.py

      - name: Bundle Hermes for embedded mode
        shell: pwsh
        run: |
          Compress-Archive -Path dist/hermes.exe -DestinationPath hermes-bundle-windows.zip -Force

      - name: Build all-in-one installer
        shell: pwsh
        run: |
          # Make sure installer output dir exists
          New-Item -ItemType Directory -Force -Path installer
          # Download Inno Setup
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "$env:TEMP\is.exe"
          Start-Process -Wait -FilePath "$env:TEMP\is.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=$env:TEMP\is"
          # Compile installer
          & "$env:TEMP\is\ISCC.exe" installer.iss

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/HermesDesktop-Setup-*.exe
            hermes-bundle-windows.zip
          body: |
            # Hermes Desktop ${{ github.ref_name }}

            ## 一键安装（推荐）
            - [HermesDesktop-Setup-${{ github.ref_name }}.exe](installer/HermesDesktop-Setup-${{ github.ref_name }}.exe)

            下载安装包，双击安装，打开即用。内置 Hermes Agent，无需额外配置。

            ## 手动部署
            - 从 Release Assets 下载 `hermes-bundle-windows.zip`，解压到 `%USERPROFILE%\\.hermes-desktop\\hermes\\`

            ## 从源码构建
            ```bash
            git clone https://github.com/lovesmile/hermes-desktop-ui.git
            cd hermes-desktop-ui
            flutter pub get
            flutter build windows --release
            ```
          draft: false
          prerelease: false
