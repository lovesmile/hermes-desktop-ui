name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path hermes-desktop-ui
          Copy-Item "build\windows\x64\runner\Release\hermes_desktop.exe" -Destination "hermes-desktop-ui\"
          Copy-Item "README.md" -Destination "hermes-desktop-ui\"
          Copy-Item "SKILL.md" -Destination "hermes-desktop-ui\"
          if (Test-Path "assets") {
            Copy-Item -Recurse "assets" -Destination "hermes-desktop-ui\"
          }
          Compress-Archive -Path "hermes-desktop-ui\*" -DestinationPath "hermes-desktop-ui-windows-${{ github.ref_name }}.zip"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: hermes-desktop-ui-windows-${{ github.ref_name }}.zip
          body: |
            # Hermes Desktop UI ${{ github.ref_name }}

            ## 下载
            - [Windows 版](hermes-desktop-ui-windows-${{ github.ref_name }}.zip)

            ## 使用方法
            1. 解压后双击 `hermes_desktop.exe` 运行
            2. 确保 Hermes Agent 已安装并运行（`hermes gateway run`）
            3. 首次使用在设置页配置 Gateway 地址（默认 `http://localhost:8642`）

            ## 从源码构建
            ```bash
            git clone https://github.com/lovesmile/hermes-desktop-ui.git
            cd hermes-desktop-ui
            flutter pub get
            flutter build windows --release
            ```
          draft: false
          prerelease: false
