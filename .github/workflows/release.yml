name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Windows release
        run: flutter build windows --release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Hermes standalone exe
        shell: pwsh
        run: |
          pip install hermes-agent==0.14.0 pyinstaller
          pyinstaller --onefile --name hermes scripts/run_hermes.py

      - name: Build all-in-one installer
        shell: pwsh
        run: |
          # Make sure installer output dir exists
          New-Item -ItemType Directory -Force -Path installer
          # Download Inno Setup
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "$env:TEMP\is.exe"
          Start-Process -Wait -FilePath "$env:TEMP\is.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=$env:TEMP\is"
          # Compile installer
          & "$env:TEMP\is\ISCC.exe" installer.iss

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/HermesDesktop-Setup-*.exe
            dist/hermes.exe
          body: |
            # Hermes Desktop ${{ github.ref_name }}

            ## 一键安装（推荐）
            - [HermesDesktop-Setup-${{ github.ref_name }}.exe](installer/HermesDesktop-Setup-${{ github.ref_name }}.exe)

            下载安装包，双击安装，打开即用。内置 Hermes Agent，无需额外配置。

            ## 手动部署
            - [hermes_desktop.exe](hermes-desktop-ui-windows-${{ github.ref_name }}.zip)
            - [hermes.exe（Hermes Agent）](hermes-bundle-windows-${{ github.ref_name }}.zip)

            ## 从源码构建
            ```bash
            git clone https://github.com/lovesmile/hermes-desktop-ui.git
            cd hermes-desktop-ui
            flutter pub get
            flutter build windows --release
            ```
          draft: false
          prerelease: false
